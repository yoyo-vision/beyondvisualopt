backend:
  name: github
  repo: yoyo-vision/beyondvisualopt
  branch: main
  base_url: https://beyondvisualopt.com
  auth_endpoint: api/auth

media_folder: public/images
public_folder: /images

locale: zh_Hant

collections:
  # 視覺小知識文章
  - name: blog
    label: 視覺小知識文章
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 發布日期, name: date, widget: datetime, format: YYYY-MM-DD }
      - { label: 標籤, name: tag, widget: select, options: [多焦點鏡片, 蔡司鏡片, 兒童近視控制, 高度近視眼鏡, 老花視覺, 驗光知識, 數位疲勞, 近視控制] }
      - { label: 摘要, name: excerpt, widget: string }
      - label: 封面圖片
        name: image
        widget: image
        required: false
      - label: YouTube 影片 ID
        name: youtube
        widget: string
        required: false
        hint: "只填 YouTube 影片 ID，例如 dQw4w9WgXcQ"
      - label: Instagram 貼文連結
        name: instagram
        widget: string
        required: false
        hint: "貼上 Instagram 貼文完整網址"
      - { label: 內文, name: body, widget: markdown }

  # 首頁設定
  - name: homepage
    label: 首頁設定
    files:
      - label: 首頁內容
        name: homepage
        file: src/content/settings/homepage.json
        fields:
          - { label: Hero 主標題, name: hero_title, widget: string }
          - { label: Hero 副標題, name: hero_subtitle, widget: text }
          - label: Hero 背景圖片
            name: hero_image
            widget: image
            required: false
          - { label: 新莊店地址, name: xinzhuang_address, widget: string }
          - { label: 板橋店地址, name: banqiao_address, widget: string }
          - { label: LINE OA 連結, name: line_url, widget: string }
          - { label: Instagram 連結, name: instagram_url, widget: string }
          - { label: YouTube 頻道連結, name: youtube_url, widget: string }
          - label: 首頁展示 YouTube 影片 ID
            name: homepage_youtube
            widget: string
            required: false
            hint: "只填影片 ID，例如 dQw4w9WgXcQ"

  # 鏡框品牌
  - name: frames
    label: 鏡框品牌
    folder: src/content/frames
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 品牌名稱, name: name, widget: string }
      - { label: 產地, name: origin, widget: string }
      - { label: 類型, name: type, widget: string }
      - { label: 說明, name: desc, widget: text }
      - { label: 標籤, name: badge, widget: string }
      - label: 品牌圖片
        name: image
        widget: image
        required: false
      - { label: 排序, name: order, widget: number, default: 99 }

  # 服務內容
  - name: services
    label: 服務內容
    folder: src/content/services
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 服務名稱, name: title, widget: string }
      - { label: 副標題, name: subtitle, widget: string }
      - { label: Icon（Emoji）, name: icon, widget: string }
      - { label: 適用門市, name: tag, widget: string }
      - label: 服務項目
        name: items
        widget: list
        field: { label: 項目, name: item, widget: string }
      - label: 說明圖片
        name: image
        widget: image
        required: false
